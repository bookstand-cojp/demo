<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面（デモ）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 0 16px 16px;
      min-height: 100vh;
    }
    .demo-bar {
      background: #333;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
      padding: 8px 12px;
      margin: 0 -16px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .demo-bar .reset {
      background: transparent;
      border: 1px solid #666;
      color: #ccc;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .demo-bar .reset:hover { color: #fff; border-color: #999; }
    h1 { font-size: 20px; font-weight: 700; color: #222; margin-bottom: 16px; }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .btn {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #e85d04;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.secondary { background: #555; }
    .msg {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .msg.error { background: #ffebee; color: #c62828; display: block; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      font-size: 13px;
      min-width: 700px;
    }
    th {
      background: #333;
      color: #fff;
      padding: 10px 10px;
      text-align: left;
      white-space: nowrap;
    }
    td {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    select.inline {
      font-size: 13px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    input.date-input {
      font-size: 13px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 130px;
    }
    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: #e85d04;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-sm:disabled { opacity: 0.5; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.issued { background: #e8f5e9; color: #2e7d32; }
    .badge.pending { background: #fff3e0; color: #e65100; }
    .loading { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>
  <div class="demo-bar">
    <span>🎭 DEMO｜架空のデータです（ブラウザ内のみ保存）</span>
    <button class="reset" onclick="resetDemo()">デモデータをリセット</button>
  </div>

  <h1>管理画面 - 注文一覧</h1>

  <div class="toolbar">
    <button class="btn" id="btnDelivery" onclick="issueDeliveryNote()">納品書発行</button>
    <button class="btn secondary" id="btnInvoice" onclick="generateInvoice()">請求書発行</button>
    <button class="btn secondary" onclick="loadOrders()">更新</button>
  </div>

  <div class="msg" id="msg"></div>

  <div class="table-wrap">
    <div class="loading" id="loading">読み込み中...</div>
    <table id="orderTable" style="display:none">
      <thead>
        <tr>
          <th>注文日</th>
          <th>顧客名</th>
          <th>商品名</th>
          <th>数量</th>
          <th>ステータス</th>
          <th>納品日</th>
          <th>納品書</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="orderBody"></tbody>
    </table>
  </div>

  <script>
    /**
     * デモ用モックAPI（このファイル単体で完結）
     * すべて架空のデータで、ブラウザのlocalStorageにのみ保存される。
     * 実際のスプレッドシート・メール送信には一切接続しない。
     */
    var STORAGE_KEY = 'gyoza_demo_orders_anon_v1';
    var LATENCY_MS = 450;
    var STATUS_OPTIONS = ['受付', '製作済み', '発送済み', '請求完了', '入金確認'];

    function todayStr(offsetDays) {
      var d = new Date();
      d.setDate(d.getDate() + (offsetDays || 0));
      return d.toISOString().slice(0, 10);
    }

    function seedOrders() {
      return [
        {
          rowNum: 3,
          orderId: 'ORD-0000000101',
          status: '入金確認',
          orderDate: todayStr(-9),
          customerName: 'お客様A（麺類）',
          productName: '冷凍餃子100個入',
          qty: 3,
          deliveryDate: todayStr(-6),
          deliveryNoteIssued: true,
          deliveryNoteId: 'DEL-0000000101',
        },
        {
          rowNum: 4,
          orderId: 'ORD-0000000101',
          status: '入金確認',
          orderDate: todayStr(-9),
          customerName: 'お客様A（麺類）',
          productName: '送料',
          qty: 1,
          deliveryDate: todayStr(-6),
          deliveryNoteIssued: true,
          deliveryNoteId: 'DEL-0000000101',
        },
        {
          rowNum: 5,
          orderId: 'ORD-0000000102',
          status: '発送済み',
          orderDate: todayStr(-2),
          customerName: 'お客様B（焼肉）',
          productName: '冷凍餃子50個入',
          qty: 5,
          deliveryDate: todayStr(-1),
          deliveryNoteIssued: false,
          deliveryNoteId: '',
        },
        {
          rowNum: 6,
          orderId: 'ORD-0000000103',
          status: '受付',
          orderDate: todayStr(0),
          customerName: 'お客様C（居酒屋）',
          productName: '冷凍餃子100個入',
          qty: 2,
          deliveryDate: '',
          deliveryNoteIssued: false,
          deliveryNoteId: '',
        },
      ];
    }

    function loadData() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          var seeded = seedOrders();
          saveData(seeded);
          return seeded;
        }
        return JSON.parse(raw);
      } catch (e) {
        var fallback = seedOrders();
        saveData(fallback);
        return fallback;
      }
    }

    function saveData(orders) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
    }

    var DemoAPI = {
      getOrders: function (onSuccess) {
        setTimeout(function () {
          var orders = loadData().slice().sort(function (a, b) { return b.rowNum - a.rowNum; });
          onSuccess({ success: true, orders: orders });
        }, LATENCY_MS);
      },
      updateStatus: function (params, onSuccess) {
        setTimeout(function () {
          var orders = loadData();
          var target = orders.filter(function (o) { return o.rowNum === params.rowNum; });
          if (!target.length) {
            onSuccess({ success: false, error: '対象の行が見つかりません' });
            return;
          }
          target.forEach(function (o) {
            o.status = params.status;
            o.deliveryDate = params.deliveryDate;
          });
          saveData(orders);
          onSuccess({ success: true });
        }, LATENCY_MS);
      },
      issueDeliveryNote: function (onSuccess) {
        setTimeout(function () {
          var orders = loadData();
          var target = orders.filter(function (o) {
            return o.status === '発送済み' && o.deliveryDate && !o.deliveryNoteIssued;
          });
          var byKey = {};
          target.forEach(function (o) {
            var key = o.customerName + '|' + o.deliveryDate;
            if (!byKey[key]) byKey[key] = [];
            byKey[key].push(o);
          });
          var counter = 110 + Math.floor(Math.random() * 50);
          Object.keys(byKey).forEach(function (key) {
            var delId = 'DEL-' + String(counter++).padStart(10, '0');
            byKey[key].forEach(function (o) {
              o.deliveryNoteIssued = true;
              o.deliveryNoteId = delId;
            });
          });
          saveData(orders);
          onSuccess({ success: true, issuedCount: target.length });
        }, LATENCY_MS);
      },
      generateInvoice: function (onSuccess) {
        setTimeout(function () {
          var orders = loadData();
          var target = orders.filter(function (o) { return o.status === '発送済み' || o.status === '製作済み'; });
          onSuccess({ success: true, issuedCount: target.length });
        }, LATENCY_MS);
      },
      reset: function () {
        saveData(seedOrders());
      },
    };

    function loadOrders() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('orderTable').style.display = 'none';
      document.getElementById('msg').className = 'msg';

      DemoAPI.getOrders(function (result) {
        document.getElementById('loading').style.display = 'none';
        if (!result.success) {
          showMsg('error', 'エラー: ' + result.error);
          return;
        }
        renderOrders(result.orders || []);
        document.getElementById('orderTable').style.display = 'table';
      });
    }

    function renderOrders(orders) {
      var tbody = document.getElementById('orderBody');
      tbody.innerHTML = '';

      if (orders.length === 0) {
        var tr = document.createElement('tr');
        var td = document.createElement('td');
        td.colSpan = 8;
        td.textContent = '注文データがありません';
        td.style.textAlign = 'center';
        td.style.color = '#888';
        td.style.padding = '30px';
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      orders.forEach(function(order) {
        var tr = document.createElement('tr');

        var statusSel = '<select class="inline" id="status_' + order.rowNum + '">';
        STATUS_OPTIONS.forEach(function(s) {
          statusSel += '<option value="' + s + '"' + (order.status === s ? ' selected' : '') + '>' + s + '</option>';
        });
        statusSel += '</select>';

        var dateSel = '<input type="date" class="date-input" id="date_' + order.rowNum + '" value="' + (order.deliveryDate || '') + '">';

        var badge = order.deliveryNoteIssued
          ? '<span class="badge issued">発行済 ' + (order.deliveryNoteId ? order.deliveryNoteId : '') + '</span>'
          : '<span class="badge pending">未発行</span>';

        var updateBtn = '<button class="btn-sm" onclick="updateRow(' + order.rowNum + ')">更新</button>';

        tr.innerHTML = [
          '<td>' + (order.orderDate || '') + '</td>',
          '<td>' + escHtml(order.customerName) + '</td>',
          '<td>' + escHtml(order.productName) + '</td>',
          '<td style="text-align:right">' + order.qty + '</td>',
          '<td>' + statusSel + '</td>',
          '<td>' + dateSel + '</td>',
          '<td>' + badge + '</td>',
          '<td>' + updateBtn + '</td>',
        ].join('');

        tbody.appendChild(tr);
      });
    }

    function updateRow(rowNum) {
      var status = document.getElementById('status_' + rowNum).value;
      var deliveryDate = document.getElementById('date_' + rowNum).value;

      DemoAPI.updateStatus({ rowNum: rowNum, status: status, deliveryDate: deliveryDate }, function (result) {
        if (result.success) {
          showMsg('success', '行 ' + rowNum + ' を更新しました');
        } else {
          showMsg('error', 'エラー: ' + result.error);
        }
      });
    }

    function issueDeliveryNote() {
      var btn = document.getElementById('btnDelivery');
      btn.disabled = true;
      btn.textContent = '発行中...';
      showMsg('', '');

      DemoAPI.issueDeliveryNote(function (result) {
        btn.disabled = false;
        btn.textContent = '納品書発行';
        if (result.success) {
          showMsg('success', '納品書発行完了: ' + result.issuedCount + '件発行しました');
          loadOrders();
        } else {
          showMsg('error', 'エラー: ' + result.error);
        }
      });
    }

    function generateInvoice() {
      var btn = document.getElementById('btnInvoice');
      btn.disabled = true;
      btn.textContent = '発行中...';
      showMsg('', '');

      DemoAPI.generateInvoice(function (result) {
        btn.disabled = false;
        btn.textContent = '請求書発行';
        if (result.success) {
          showMsg('success', '請求書発行完了: ' + result.issuedCount + '件発行しました');
        } else {
          showMsg('error', 'エラー: ' + result.error);
        }
      });
    }

    function resetDemo() {
      DemoAPI.reset();
      showMsg('success', 'デモデータを初期状態に戻しました');
      loadOrders();
    }

    function showMsg(type, text) {
      var el = document.getElementById('msg');
      el.className = type ? 'msg ' + type : 'msg';
      el.textContent = text;
    }

    function escHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // 初回ロード
    loadOrders();
  </script>
</body>
</html>
