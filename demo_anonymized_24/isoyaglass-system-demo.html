<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破棄欠点集計 入力フォーム</title>
  <?!= include('Style') ?>
</head>
<body>
  <header>
    <h1>ライン別直別 破棄欠点集計システム</h1>
    <a id="adminLink" href="<?= adminUrl ?>">管理画面 →</a>
  </header>

  <main>
    <div id="alertBox" class="alert"></div>

    <!-- ①基本情報 -->
    <div class="card">
      <h2>基本情報</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="production_date">生産年月日 *</label>
          <input type="date" id="production_date" required>
        </div>
        <div class="form-group">
          <label for="line">ライン *</label>
          <select id="line">
            <option value="">選択してください</option>
            <option value="1F">1F</option>
            <option value="2F">2F</option>
            <option value="3F">3F</option>
          </select>
        </div>
        <div class="form-group">
          <label for="shift">直 *</label>
          <select id="shift">
            <option value="">選択してください</option>
            <option value="1直">1直</option>
            <option value="2直">2直</option>
            <option value="3直">3直</option>
          </select>
        </div>
        <div class="form-group">
          <label for="slot_num">瓶 *</label>
          <select id="slot_num">
            <option value="">選択してください</option>
            <option value="1">1瓶目</option>
            <option value="2">2瓶目</option>
            <option value="3">3瓶目</option>
          </select>
        </div>
      </div>
      <div class="night-notice" id="nightShiftNotice">
        ⚠ 3直（22時〜翌6時）の生産年月日は「直が始まった日」を入力してください。（例：5/24 22時開始 → 5/24と入力）
      </div>
    </div>

    <!-- ②製品・数値入力 -->
    <div class="card">
      <h2>製品・数値入力</h2>
      <div class="form-group" style="margin-bottom:16px">
        <label>製品名 *</label>
        <div class="product-select-wrap" id="productSelectWrap"></div>
        <input type="hidden" id="hidden_product_name">
      </div>
      <div class="form-grid-5">
        <div class="form-group">
          <label for="kaiten_num">回転数</label>
          <input type="number" id="kaiten_num" min="0" value="0" inputmode="numeric">
        </div>
        <div class="form-group">
          <label for="rea_haki">レアー破棄</label>
          <input type="number" id="rea_haki" min="0" value="0" inputmode="numeric">
        </div>
        <div class="form-group">
          <label for="kensa_num">検査数</label>
          <input type="number" id="kensa_num" min="0" value="0" inputmode="numeric" style="font-weight:700">
        </div>
        <div class="form-group">
          <label for="kbi_haki">①KBI破棄</label>
          <input type="number" id="kbi_haki" min="0" value="0" inputmode="numeric" style="font-weight:700">
        </div>
        <div class="form-group">
          <label for="kansei_num">完成数</label>
          <input type="number" id="kansei_num" min="0" value="0" inputmode="numeric" style="font-weight:700">
        </div>
      </div>
    </div>

    <!-- ③目視破棄テーブル -->
    <div class="card">
      <h2>③目視破棄 入力表</h2>
      <div class="defect-table-wrap">
        <table class="defect-table" id="defectTable"></table>
      </div>
      <div class="defect-total-box">
        <span class="dt-label">③目視破棄 合計（全時間帯自動集計）</span>
        <span>
          <span class="dt-value" id="defectTotalNum">0</span>
          <span class="dt-unit">本</span>
        </span>
      </div>
    </div>

    <!-- 完了ボタン -->
    <button type="button" class="btn btn-primary btn-full" id="submitBtn" style="margin-bottom:10px; min-height:56px; font-size:1.15rem;">
      完了（データ登録）
    </button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">処理中...</div>
    </div>
  </main>

  <script>
  'use strict';

  // ─── 定数 ────────────────────────────────────
  var TIMES_BY_SHIFT = {
    '1直': ['7時台','8時台','9時台','10時台','11時台','12時台','13時台'],
    '2直': ['14時台','15時台','16時台','17時台','18時台','19時台','20時台','21時台'],
    '3直': ['22時台','23時台','0時台','1時台','2時台','3時台','4時台','5時台','6時台'],
  };
  var ROLES        = ['目1','交','目2','交'];
  var DEFECT_TYPES = ['汚れ','アワ','ブツ','びり','しわ','その他'];

  function getCurrentTimes() {
    var shift = document.getElementById('shift').value;
    return TIMES_BY_SHIFT[shift] || TIMES_BY_SHIFT['1直'];
  }

  // ─── 製品マスター + ピッカー ──────────────────
  var productGroups = [];
  var pickerOverlay = null;
  var pickerHidden  = null;
  var pickerTrigger = null;

  function loadProducts() {
    google.script.run
      .withSuccessHandler(function(products) {
        productGroups = buildProductGroups(products || []);
      })
      .withFailureHandler(function() { productGroups = []; })
      .getProducts();
  }

  function buildProductGroups(products) {
    var buckets = {};
    var ORDER = ['漢字','ひらがな','カタカナ','英数字','その他'];
    products.forEach(function(name) {
      if (!name) return;
      var key = classifyFirstChar(name[0]);
      if (!buckets[key]) buckets[key] = [];
      buckets[key].push(name);
    });
    return ORDER.filter(function(k) { return buckets[k]; })
                .map(function(k) { return { label: k, products: buckets[k] }; });
  }

  function classifyFirstChar(c) {
    if (!c) return 'その他';
    if (/[一-鿿㐀-䶿]/.test(c)) return '漢字';
    if (/[぀-ゟ]/.test(c)) return 'ひらがな';
    if (/[゠-ヿ]/.test(c)) return 'カタカナ';
    if (/[A-Za-z0-9]/.test(c)) return '英数字';
    return 'その他';
  }

  function initProductSelect(container, hiddenInput) {
    var trigger = document.createElement('button');
    trigger.type = 'button';
    trigger.className = 'product-trigger placeholder';
    trigger.textContent = '製品を選択...';
    container.appendChild(trigger);
    trigger.addEventListener('click', function() {
      pickerHidden  = hiddenInput;
      pickerTrigger = trigger;
      openPicker();
    });
  }

  function openPicker() {
    closePicker();
    var activeGroup = 'all';
    var searchQuery = '';

    var overlay = document.createElement('div');
    overlay.className = 'picker-overlay';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closePicker(); });

    var modal = document.createElement('div');
    modal.className = 'picker-modal';
    overlay.appendChild(modal);

    // ヘッダー
    var header = document.createElement('div'); header.className = 'picker-header';
    var headerTop = document.createElement('div'); headerTop.className = 'picker-header-top';
    var titleEl = document.createElement('div'); titleEl.className = 'picker-title'; titleEl.textContent = '製品を選択';
    var closeBtn = document.createElement('button');
    closeBtn.type = 'button'; closeBtn.className = 'picker-close'; closeBtn.innerHTML = '&times;';
    closeBtn.addEventListener('click', closePicker);
    headerTop.appendChild(titleEl); headerTop.appendChild(closeBtn);

    var searchWrap = document.createElement('div'); searchWrap.className = 'picker-search-wrap';
    var searchIcon = document.createElement('span'); searchIcon.className = 'picker-search-icon'; searchIcon.textContent = '🔍';
    var searchInput = document.createElement('input');
    searchInput.type = 'search'; searchInput.className = 'picker-search';
    searchInput.placeholder = '製品名を検索...'; searchInput.autocomplete = 'off';
    searchInput.addEventListener('input', function() {
      searchQuery = searchInput.value;
      if (searchQuery.trim()) activeGroup = 'all';
      renderTabs(); renderList();
    });
    searchWrap.appendChild(searchIcon); searchWrap.appendChild(searchInput);
    header.appendChild(headerTop); header.appendChild(searchWrap);
    modal.appendChild(header);

    var tabs = document.createElement('div'); tabs.className = 'picker-tabs';
    modal.appendChild(tabs);

    var registerArea = document.createElement('div');
    registerArea.className = 'picker-register-area'; registerArea.style.display = 'none';
    modal.appendChild(registerArea);

    var list = document.createElement('div'); list.className = 'picker-list';
    modal.appendChild(list);

    function renderTabs() {
      tabs.innerHTML = '';
      var allGroups = [{ label: 'すべて', key: 'all' }].concat(
        productGroups.map(function(g) { return { label: g.label, key: g.label }; })
      );
      allGroups.forEach(function(item) {
        var tab = document.createElement('button');
        tab.type = 'button';
        tab.className = 'picker-tab' + (activeGroup === item.key ? ' active' : '');
        tab.textContent = item.label;
        tab.addEventListener('click', function() {
          activeGroup = item.key; searchInput.value = ''; searchQuery = '';
          renderTabs(); renderList();
        });
        tabs.appendChild(tab);
      });
    }

    function renderList() {
      list.innerHTML = '';
      var q = searchQuery.trim().toLowerCase();
      var totalCount = 0;
      var groupsToShow = activeGroup === 'all' ? productGroups
        : productGroups.filter(function(g) { return g.label === activeGroup; });

      groupsToShow.forEach(function(group) {
        var matched = q
          ? group.products.filter(function(p) { return p.toLowerCase().indexOf(q) !== -1; })
          : group.products;
        if (!matched.length) return;
        totalCount += matched.length;

        if (activeGroup === 'all') {
          var gl = document.createElement('div');
          gl.className = 'picker-group-label'; gl.textContent = group.label;
          list.appendChild(gl);
        }

        matched.forEach(function(name) {
          var item = document.createElement('div');
          item.className = 'picker-item' + (pickerHidden.value === name ? ' selected' : '');
          if (q) {
            var idx = name.toLowerCase().indexOf(q);
            item.innerHTML = esc(name.slice(0, idx))
              + '<mark>' + esc(name.slice(idx, idx + q.length)) + '</mark>'
              + esc(name.slice(idx + q.length));
          } else {
            item.textContent = name;
          }
          item.addEventListener('click', function() {
            pickerHidden.value = name;
            pickerTrigger.textContent = name; pickerTrigger.classList.remove('placeholder');
            closePicker();
          });
          list.appendChild(item);
        });
      });

      // 新規登録ボタン
      var addBtn = document.createElement('div');
      addBtn.className = 'picker-item picker-add-btn';
      if (totalCount === 0 && q) {
        addBtn.innerHTML = '＋ 「<strong>' + esc(q) + '</strong>」を新規登録する';
        addBtn.dataset.prefill = q;
      } else {
        addBtn.textContent = '＋ 新しい製品を登録する';
        addBtn.dataset.prefill = '';
      }
      addBtn.addEventListener('click', function() { showRegisterForm(addBtn.dataset.prefill, list, tabs, registerArea); });
      list.appendChild(addBtn);

      if (totalCount === 0 && !q) {
        var empty = document.createElement('div');
        empty.className = 'picker-empty'; empty.textContent = '製品が登録されていません';
        list.insertBefore(empty, addBtn);
      }
    }

    renderTabs(); renderList();
    document.body.appendChild(overlay);
    pickerOverlay = overlay;
    requestAnimationFrame(function() { searchInput.focus(); });
  }

  function showRegisterForm(prefill, list, tabs, registerArea) {
    list.style.display = 'none'; tabs.style.display = 'none';
    registerArea.style.display = 'block'; registerArea.innerHTML = '';

    var titleR = document.createElement('div');
    titleR.style.cssText = 'font-weight:700;font-size:0.95rem;padding:14px 16px 8px;border-bottom:1px solid #e5e7eb;';
    titleR.textContent = '新しい製品をマスターに登録';
    registerArea.appendChild(titleR);

    var form = document.createElement('div');
    form.style.cssText = 'padding:16px;display:flex;flex-direction:column;gap:14px;';

    var nameGroup = document.createElement('div'); nameGroup.className = 'form-group';
    var nameLabel = document.createElement('label'); nameLabel.textContent = '製品名 *';
    var nameInput = document.createElement('input');
    nameInput.type = 'text'; nameInput.className = 'picker-search';
    nameInput.style.padding = '10px 12px'; nameInput.placeholder = '製品名を入力...';
    nameInput.value = prefill || '';
    nameGroup.appendChild(nameLabel); nameGroup.appendChild(nameInput);
    form.appendChild(nameGroup);

    var errMsg = document.createElement('div');
    errMsg.style.cssText = 'color:#dc2626;font-size:0.88rem;display:none;';
    form.appendChild(errMsg);

    var btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:10px;';
    var saveBtn = document.createElement('button');
    saveBtn.type = 'button'; saveBtn.className = 'btn btn-primary'; saveBtn.style.flex = '1';
    saveBtn.textContent = '登録する';
    var backBtn = document.createElement('button');
    backBtn.type = 'button'; backBtn.className = 'btn';
    backBtn.style.cssText = 'background:#f3f4f6;color:#374151;';
    backBtn.textContent = '戻る';
    backBtn.addEventListener('click', function() {
      registerArea.style.display = 'none'; list.style.display = ''; tabs.style.display = '';
    });

    saveBtn.addEventListener('click', function() {
      var newName = nameInput.value.trim();
      if (!newName) { errMsg.textContent = '製品名を入力してください。'; errMsg.style.display = 'block'; return; }
      saveBtn.disabled = true; saveBtn.innerHTML = '<span class="spinner"></span>';

      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success) {
            productGroups = result.data.groups;
            pickerHidden.value = newName;
            pickerTrigger.textContent = newName; pickerTrigger.classList.remove('placeholder');
            closePicker();
          } else {
            errMsg.textContent = (result && result.message) || 'エラーが発生しました。再度お試しください。';
            errMsg.style.display = 'block';
            saveBtn.disabled = false; saveBtn.textContent = '登録する';
          }
        })
        .withFailureHandler(function(e) {
          errMsg.textContent = e.message || 'エラーが発生しました。再度お試しください。';
          errMsg.style.display = 'block';
          saveBtn.disabled = false; saveBtn.textContent = '登録する';
        })
        .addProduct(newName);
    });

    btnRow.appendChild(saveBtn); btnRow.appendChild(backBtn); form.appendChild(btnRow);
    registerArea.appendChild(form);
    setTimeout(function() { nameInput.focus(); }, 50);
  }

  function closePicker() {
    if (pickerOverlay) { pickerOverlay.remove(); pickerOverlay = null; }
  }

  // ─── ③目視破棄テーブル ─────────────────────────
  function buildDefectTable() {
    var tbl = document.getElementById('defectTable');
    tbl.innerHTML = '';
    var TIMES = getCurrentTimes();

    // ヘッダー行
    var thead = tbl.createTHead();
    var hRow = thead.insertRow();
    ['時間帯','担当','汚れ','アワ','ブツ','びり','しわ','その他','小計'].forEach(function(h) {
      var th = document.createElement('th'); th.textContent = h;
      hRow.appendChild(th);
    });

    // データ行
    var tbody = tbl.createTBody();
    TIMES.forEach(function(time, ti) {
      ROLES.forEach(function(role, ri) {
        var tr = tbody.insertRow();

        // 時間帯セル（先頭行のみ rowspan）
        if (ri === 0) {
          var tdTime = document.createElement('td');
          tdTime.textContent = time; tdTime.className = 'time-cell';
          tdTime.rowSpan = ROLES.length;
          tr.appendChild(tdTime);
        }

        // 担当セル
        var tdRole = document.createElement('td');
        tdRole.textContent = role; tdRole.className = 'role-cell';
        tr.appendChild(tdRole);

        // 欠点種別入力
        DEFECT_TYPES.forEach(function(type, di) {
          var td = tr.insertCell();
          var inp = document.createElement('input');
          inp.type = 'number'; inp.min = '0'; inp.value = '0';
          inp.className = 'def-input'; inp.inputMode = 'numeric';
          inp.id = 'def_' + ti + '_' + ri + '_' + di;
          inp.dataset.ti = ti; inp.dataset.ri = ri; inp.dataset.di = di;
          inp.addEventListener('input', function() { updateRowSum(ti, ri); updateDefectTotal(); });
          td.appendChild(inp);
        });

        // 小計セル
        var tdSum = document.createElement('td');
        tdSum.className = 'row-sum'; tdSum.id = 'rsum_' + ti + '_' + ri;
        tdSum.textContent = '0';
        tr.appendChild(tdSum);
      });
    });
  }

  function updateRowSum(ti, ri) {
    var sum = 0;
    DEFECT_TYPES.forEach(function(_, di) {
      var inp = document.getElementById('def_' + ti + '_' + ri + '_' + di);
      sum += inp ? (Number(inp.value) || 0) : 0;
    });
    var cell = document.getElementById('rsum_' + ti + '_' + ri);
    if (cell) cell.textContent = sum;
  }

  function updateDefectTotal() {
    var total = 0;
    document.querySelectorAll('.def-input').forEach(function(inp) {
      total += Number(inp.value) || 0;
    });
    document.getElementById('defectTotalNum').textContent = total.toLocaleString();
  }

  function collectDefectTable() {
    var result = [];
    var TIMES = getCurrentTimes();
    TIMES.forEach(function(time, ti) {
      ROLES.forEach(function(role, ri) {
        var entry = { time: time, role: role };
        DEFECT_TYPES.forEach(function(type, di) {
          var inp = document.getElementById('def_' + ti + '_' + ri + '_' + di);
          entry[type] = inp ? (Number(inp.value) || 0) : 0;
        });
        result.push(entry);
      });
    });
    return result;
  }

  // ─── 直の切り替え：時間帯テーブル再構築 + 3直注意書き ────
  document.getElementById('shift').addEventListener('change', function() {
    var notice = document.getElementById('nightShiftNotice');
    notice.classList.toggle('show', this.value === '3直');
    buildDefectTable();
    updateDefectTotal();
  });

  // ─── 完了ボタン（データ登録）─────────────────
  document.getElementById('submitBtn').addEventListener('click', function() {
    hideAlert();

    var date     = document.getElementById('production_date').value;
    var line     = document.getElementById('line').value;
    var shift    = document.getElementById('shift').value;
    var slotNum  = document.getElementById('slot_num').value;
    var product  = document.getElementById('hidden_product_name').value;

    if (!date)    { showAlert('error', '生産年月日を入力してください。'); return; }
    if (!line)    { showAlert('error', 'ラインを選択してください。'); return; }
    if (!shift)   { showAlert('error', '直を選択してください。'); return; }
    if (!slotNum) { showAlert('error', '便数を選択してください。'); return; }
    if (!product) { showAlert('error', '製品名を選択してください。'); return; }

    var payload = {
      productionDate: date,
      line:           line,
      shift:          shift,
      slotNum:        slotNum,
      productName:    product,
      kaitenNum:      getNum('kaiten_num'),
      reaHaki:        getNum('rea_haki'),
      kensaNum:       getNum('kensa_num'),
      kbiHaki:        getNum('kbi_haki'),
      kanseiNum:      getNum('kansei_num'),
      defectTable:    collectDefectTable()
    };

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 登録中...';
    document.getElementById('progressWrap').classList.add('show');
    document.getElementById('progressLabel').textContent = 'スプレッドシートへ書き込み中...';
    document.getElementById('progressFill').style.width = '60%';

    google.script.run
      .withSuccessHandler(function() {
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('progressLabel').textContent = '完了！';
        setTimeout(function() {
          btn.disabled = false; btn.textContent = '完了（データ登録）';
          document.getElementById('progressWrap').classList.remove('show');
          document.getElementById('progressFill').style.width = '0%';
          showAlert('success', 'データを登録しました。');
        }, 500);
      })
      .withFailureHandler(function(e) {
        btn.disabled = false; btn.textContent = '完了（データ登録）';
        document.getElementById('progressWrap').classList.remove('show');
        document.getElementById('progressFill').style.width = '0%';
        showAlert('error', e.message || 'エラーが発生しました。再度お試しください。');
      })
      .submitData(payload);
  });

  // ─── ユーティリティ ───────────────────────────
  function getNum(id) {
    var el = document.getElementById(id);
    if (!el) return 0;
    var v = el.value.trim();
    return v === '' ? 0 : (Number(v) || 0);
  }
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function showAlert(type, msg) {
    var el = document.getElementById('alertBox');
    el.className = 'alert alert-' + type + ' show'; el.textContent = msg;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function hideAlert() {
    var el = document.getElementById('alertBox'); el.className = 'alert'; el.textContent = '';
  }

  // ─── 初期化 ───────────────────────────────────
  (function init() {
    document.getElementById('production_date').value = new Date().toISOString().slice(0, 10);
    loadProducts();
    buildDefectTable();

    // 製品ピッカー初期化
    var wrap   = document.getElementById('productSelectWrap');
    var hidden = document.getElementById('hidden_product_name');
    initProductSelect(wrap, hidden);

    // 管理画面リンク: サーバー側テンプレート変数が空の場合はJSで補完（白画面バグ対策）
    var adminLink = document.getElementById('adminLink');
    if (adminLink && !adminLink.href) {
      adminLink.href = window.location.href.split('?')[0] + '?page=admin';
    }
  })();
  </script>
</body>
</html>
