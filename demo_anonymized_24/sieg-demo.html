<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>〇〇建設 工事管理システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #1a2f4e;
    --steel: #2d5986;
    --sky: #4a90d9;
    --accent: #f0a500;
    --bg: #f4f6f9;
    --white: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7a8d;
    --border: #dde3ec;
    --success: #27ae60;
    --danger: #e74c3c;
  }
  body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ヘッダー */
  .header { background: var(--navy); color: white; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-logo { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
  .header-user { font-size: 13px; color: #a0b4cc; }

  /* ナビ */
  .nav { background: white; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; }
  .nav-btn { padding: 14px 20px; font-size: 13px; font-weight: 600; color: var(--muted); border: none; background: none; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .nav-btn.active { color: var(--steel); border-bottom-color: var(--sky); }

  /* ページ */
  .page { display: none; padding: 20px; max-width: 640px; margin: 0 auto; }
  .page.active { display: block; }

  /* 勤怠ページ */
  .kintai-status { background: white; border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .kintai-date { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .kintai-time { font-size: 48px; font-weight: 700; color: var(--navy); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .kintai-badge { display: inline-block; margin-top: 8px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-out { background: #f0f4f8; color: var(--muted); }
  .badge-in { background: #e8f8ee; color: var(--success); }

  .kintai-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .kintai-btn { padding: 20px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .kintai-btn .icon { font-size: 28px; }
  .btn-in { background: var(--success); color: white; }
  .btn-in:hover { background: #219a52; transform: translateY(-1px); }
  .btn-out { background: var(--danger); color: white; }
  .btn-out:hover { background: #c0392b; transform: translateY(-1px); }
  .btn-disabled { background: #dde3ec; color: var(--muted); cursor: not-allowed; }

  .kintai-log { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .log-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; }
  .log-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .log-item:last-child { border-bottom: none; }
  .log-type { font-size: 13px; font-weight: 600; }
  .log-type.in { color: var(--success); }
  .log-type.out { color: var(--danger); }
  .log-time { font-size: 13px; color: var(--muted); }
  .log-loc { font-size: 11px; color: var(--muted); }

  /* 日報ページ */
  .nippo-step { background: white; border-radius: 12px; padding: 20px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .step-label { font-size: 11px; font-weight: 700; color: var(--sky); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .step-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
  .cal-list { display: flex; flex-direction: column; gap: 8px; }
  .cal-item { border: 2px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.15s; }
  .cal-item:hover { border-color: var(--sky); background: #f0f7ff; }
  .cal-item.selected { border-color: var(--sky); background: #e8f2ff; }
  .cal-time { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .cal-name { font-size: 14px; font-weight: 600; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-input, .form-textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; transition: border-color 0.15s; }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--sky); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .save-btn { width: 100%; padding: 14px; background: var(--steel); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .save-btn:hover { background: var(--navy); }

  /* ガントページ */
  .gantt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .gantt-title { font-size: 16px; font-weight: 700; color: var(--navy); }
  .add-btn { background: var(--sky); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .gantt-wrap { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow-x: auto; }
  .gantt-container { min-width: 580px; }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .modal-btn-cancel { background: var(--bg); color: var(--muted); }
  .modal-btn-save { background: var(--steel); color: white; }

  /* トースト */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: white; padding: 12px 24px; border-radius: 24px; font-size: 13px; font-weight: 600; transition: transform 0.3s; z-index: 300; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .gantt .bar { fill: var(--steel) !important; }
  .gantt .bar-progress { fill: var(--sky) !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚙ 〇〇建設 工事管理</div>
  <div class="header-user">鈴木 健二</div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('kintai', this)">勤怠</button>
  <button class="nav-btn" onclick="showPage('nippo', this)">日報</button>
  <button class="nav-btn" onclick="showPage('gantt', this)">工事予定</button>
</nav>

<!-- 勤怠ページ -->
<div class="page active" id="page-kintai">
  <div class="kintai-status">
    <div class="kintai-date" id="today-date"></div>
    <div class="kintai-time" id="clock">00:00:00</div>
    <span class="kintai-badge badge-out" id="status-badge">未出勤</span>
  </div>
  <div class="kintai-btns">
    <button class="kintai-btn btn-in" id="btn-syukkin" onclick="punch('in')">
      <span class="icon">🟢</span>出勤
    </button>
    <button class="kintai-btn btn-out btn-disabled" id="btn-taikin" onclick="punch('out')">
      <span class="icon">🔴</span>退勤
    </button>
  </div>
  <div class="kintai-log">
    <div class="log-title">本日の記録</div>
    <div id="log-list">
      <div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">まだ打刻がありません</div>
    </div>
  </div>
</div>

<!-- 日報ページ -->
<div class="page" id="page-nippo">
  <div class="nippo-step">
    <div class="step-label">Step 1</div>
    <div class="step-title">今日の予定を選ぶ</div>
    <div class="cal-list">
      <div class="cal-item" onclick="selectCal(this, '岸和田マンション外壁工事')">
        <div class="cal-time">09:00〜12:00</div>
        <div class="cal-name">岸和田マンション外壁工事</div>
      </div>
      <div class="cal-item" onclick="selectCal(this, '泉大津倉庫 屋根修繕')">
        <div class="cal-time">13:00〜17:00</div>
        <div class="cal-name">泉大津倉庫 屋根修繕</div>
      </div>
      <div class="cal-item" onclick="selectCal(this, '社内ミーティング')">
        <div class="cal-time">17:30〜18:00</div>
        <div class="cal-name">社内ミーティング</div>
      </div>
    </div>
  </div>
  <div class="nippo-step" id="nippo-form" style="display:none;">
    <div class="step-label">Step 2</div>
    <div class="step-title" id="selected-cal-name">−</div>
    <div class="form-group">
      <label class="form-label">作業内容</label>
      <input class="form-input" placeholder="例：外壁塗装 下地処理">
    </div>
    <div class="form-group">
      <label class="form-label">同行</label>
      <input class="form-input" placeholder="例：植田一輝">
    </div>
    <div class="form-group">
      <label class="form-label">報告</label>
      <textarea class="form-textarea" placeholder="例：午前中に下地処理完了。午後は塗装1回目を施工。明日2回目予定。"></textarea>
    </div>
    <button class="save-btn" onclick="saveNippo()">日報を保存する</button>
  </div>
</div>

<!-- ガントページ -->
<div class="page" id="page-gantt">
  <div class="gantt-header">
    <div class="gantt-title">工事予定</div>
    <button class="add-btn" onclick="openModal()">＋ 工事を追加</button>
  </div>
  <div class="gantt-wrap">
    <div class="gantt-container">
      <svg id="gantt"></svg>
    </div>
  </div>
</div>

<!-- 工事追加モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">工事を追加</div>
    <div class="form-group">
      <label class="form-label">現場名</label>
      <input class="form-input" id="m-name" placeholder="例：岸和田マンション外壁工事">
    </div>
    <div class="form-group">
      <label class="form-label">住所</label>
      <input class="form-input" id="m-addr" placeholder="例：大阪府岸和田市○○町1-1">
    </div>
    <div class="form-group">
      <label class="form-label">担当者</label>
      <select class="form-input" id="m-tanto">
        <option>鈴木 健二</option>
        <option>上田</option>
        <option>社長</option>
        <option>＋ 新しい担当者を追加</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">施工業者</label>
      <select class="form-input" id="m-gyosha">
        <option>植田一輝</option>
        <option>木崎工業</option>
        <option>太平洋建材</option>
        <option>＋ 新しい業者を追加</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group">
        <label class="form-label">開始日</label>
        <input class="form-input" type="date" id="m-start">
      </div>
      <div class="form-group">
        <label class="form-label">終了日</label>
        <input class="form-input" type="date" id="m-end">
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn modal-btn-save" onclick="addTask()">追加する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 時計
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
  document.getElementById('today-date').textContent = now.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
}
setInterval(updateClock, 1000);
updateClock();

// ページ切替
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'gantt') initGantt();
}

// 打刻
let punched = false;
let logs = [];
function punch(type) {
  if (type === 'in' && punched) return;
  if (type === 'out' && !punched) return;
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  logs.push({ type, time: timeStr, loc: '大阪府岸和田市○○町（GPS取得済み）' });
  if (type === 'in') {
    punched = true;
    document.getElementById('status-badge').textContent = '出勤中';
    document.getElementById('status-badge').className = 'kintai-badge badge-in';
    document.getElementById('btn-syukkin').className = 'kintai-btn btn-in btn-disabled';
    document.getElementById('btn-taikin').className = 'kintai-btn btn-out';
  } else {
    punched = false;
    document.getElementById('status-badge').textContent = '退勤済み';
    document.getElementById('status-badge').className = 'kintai-badge badge-out';
    document.getElementById('btn-syukkin').className = 'kintai-btn btn-in btn-disabled';
    document.getElementById('btn-taikin').className = 'kintai-btn btn-out btn-disabled';
  }
  renderLogs();
  showToast(type === 'in' ? '✅ 出勤を記録しました' : '✅ 退勤を記録しました');
}

function renderLogs() {
  const el = document.getElementById('log-list');
  el.innerHTML = logs.map(l => `
    <div class="log-item">
      <div>
        <div class="log-type ${l.type === 'in' ? 'in' : 'out'}">${l.type === 'in' ? '出勤' : '退勤'}</div>
        <div class="log-loc">${l.loc}</div>
      </div>
      <div class="log-time">${l.time}</div>
    </div>
  `).join('');
}

// 日報
function selectCal(el, name) {
  document.querySelectorAll('.cal-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('selected-cal-name').textContent = name;
  document.getElementById('nippo-form').style.display = 'block';
  document.getElementById('nippo-form').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function saveNippo() {
  showToast('✅ 日報を保存しました（カレンダーに反映済み）');
  document.querySelectorAll('.cal-item').forEach(i => i.classList.remove('selected'));
  document.getElementById('nippo-form').style.display = 'none';
}

// ガント
let gantt = null;
let tasks = [
  { id: '1', name: '岸和田マンション外壁工事', start: '2026-07-01', end: '2026-07-20', progress: 30 },
  { id: '2', name: '泉大津倉庫 屋根修繕', start: '2026-07-08', end: '2026-07-15', progress: 0 },
  { id: '3', name: '堺市戸建て リフォーム', start: '2026-07-20', end: '2026-08-10', progress: 0 },
  { id: '4', name: 'test工事', start: '2026-07-05', end: '2026-07-25', progress: 60 },
];

function initGantt() {
  if (gantt) return;
  gantt = new Gantt('#gantt', tasks, {
    view_mode: 'Week',
    date_format: 'YYYY-MM-DD',
    language: 'ja',
    on_click: (task) => {},
    on_date_change: (task, start, end) => { showToast('📅 期間を更新しました'); },
  });
}

function openModal() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('m-start').value = today;
  document.getElementById('m-end').value = today;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function addTask() {
  const name = document.getElementById('m-name').value;
  const start = document.getElementById('m-start').value;
  const end = document.getElementById('m-end').value;
  if (!name || !start || !end) { showToast('⚠ 必須項目を入力してください'); return; }
  tasks.push({ id: String(tasks.length + 1), name, start, end, progress: 0 });
  gantt = null;
  document.getElementById('gantt').innerHTML = '';
  initGantt();
  closeModal();
  showToast('✅ 工事を追加しました');
}

// トースト
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
