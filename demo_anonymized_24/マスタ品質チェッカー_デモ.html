<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品マスタ健診|ふるさとパートナーアプリ デモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fbfaf7; --ink:#1c2b3a; --line:#24425e; --muted:#5c6a78;
    --card:#ffffff; --border:#dfe3e8;
    --good:#0e7a5f; --good-bg:#e3f3ec;
    --warn:#b45309; --warn-bg:#fbeeda;
    --crit:#b42318; --crit-bg:#fce8e6;
    --info:#5c6a78; --info-bg:#efefec;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.7;padding:40px 18px 70px}
  .wrap{max-width:820px;margin:0 auto}
  header{margin-bottom:26px}
  .eyebrow{font-size:12.5px;letter-spacing:.18em;color:var(--muted);font-weight:500}
  h1{font-size:clamp(22px,4vw,30px);font-weight:700;margin:6px 0 8px}
  .lead{font-size:14.5px;color:var(--muted);max-width:600px}

  .inputcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
  textarea{width:100%;min-height:150px;border:1px solid var(--border);border-radius:10px;
    padding:12px;font-family:var(--mono);font-size:12.5px;color:var(--ink);background:#fdfdfb;
    resize:vertical}
  textarea:focus{outline:2px solid var(--line);outline-offset:1px}
  .hint{font-size:12.5px;color:var(--muted);margin-top:8px}
  .row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  button{font-family:inherit;font-size:14px;font-weight:500;border-radius:9px;padding:10px 18px;
    cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--ink)}
  button:hover{border-color:var(--line)}
  button.primary{background:var(--line);color:#fff;border-color:var(--line)}
  button.primary:hover{opacity:.92}
  button:disabled{opacity:.45;cursor:not-allowed}

  .empty{margin-top:30px;text-align:center;padding:50px 20px;border:1px dashed var(--border);
    border-radius:14px;color:var(--muted);font-size:14px}

  .report{display:none;margin-top:30px}
  .report.show{display:block}

  .ticket{position:relative;background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:22px 22px 20px;overflow:hidden}
  .ticket h2{font-size:15px;font-weight:700;letter-spacing:.04em;margin-bottom:14px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .stat{border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .stat .num{font-family:var(--mono);font-size:22px;font-weight:700}
  .stat .lbl{font-size:12px;color:var(--muted);margin-top:2px}

  .stamp{position:absolute;top:16px;right:20px;width:78px;height:78px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;text-align:center;
    font-weight:700;font-size:13px;letter-spacing:.05em;transform:rotate(-9deg);
    border:2.5px solid; line-height:1.3}
  .stamp.good{color:var(--good);border-color:var(--good)}
  .stamp.bad{color:var(--crit);border-color:var(--crit)}
  .stamp::before{content:"";position:absolute;inset:6px;border:1px solid currentColor;border-radius:50%;opacity:.55}

  section.cat{margin-top:22px}
  .cathead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .catdot{width:9px;height:9px;border-radius:50%;flex:none}
  .cathead h3{font-size:14.5px;font-weight:700}
  .cathead .count{font-size:12px;color:var(--muted);font-family:var(--mono)}

  .item{display:flex;gap:12px;padding:10px 12px;border-radius:9px;margin-bottom:6px;
    border:1px solid var(--border);background:#fff;font-size:13.5px;align-items:flex-start}
  .item .code{font-family:var(--mono);font-size:12.5px;font-weight:700;white-space:nowrap;
    padding-top:1px}
  .item .desc{flex:1}
  .item .desc .name{color:var(--muted);font-size:12.5px}
  .item .desc .detail{margin-top:2px}
  .item .desc .detail b{font-weight:700}
  .arrow{color:var(--muted)}

  .cat-crit .catdot{background:var(--crit)} .cat-crit .item{border-left:3px solid var(--crit)}
  .cat-warn .catdot{background:var(--warn)} .cat-warn .item{border-left:3px solid var(--warn)}
  .cat-info .catdot{background:var(--info)} .cat-info .item{border-left:3px solid var(--info)}

  .foot{margin-top:26px;padding-top:14px;border-top:1px solid var(--border);
    font-size:12.5px;color:var(--muted)}
  .foot b{color:var(--ink);font-weight:700}
  @media(max-width:520px){body{padding:26px 12px 50px} .ticket{padding:18px}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="eyebrow">ふるさとパートナーアプリ|F1 デモ</div>
  <h1>商品マスタ健診</h1>
  <p class="lead">ふるさとdoの商品マスタを貼り付けると、削除済み行・商品コード重複・集荷先名の表記ゆれ・3割ルール超過・必須項目の空欄を一括で点検します。<b>見つけるだけで、直すのは人</b>(do側で修正)です。</p>
</header>

<div class="inputcard">
  <textarea id="input" placeholder="doの商品マスタをここに貼り付け(スプレッドシートからコピーしたタブ区切りのままでOK)。1行目はヘッダー行。"></textarea>
  <div class="hint">列名で読み取ります: 商品コード / 商品名称 / 集荷先名 / 出品商品情報削除フラグ / 寄附金額1 / 提供価格(税込)1</div>
  <div class="row">
    <button class="primary" id="runBtn">点検する</button>
    <button id="sampleBtn">架空のサンプルデータを試す</button>
    <button id="clearBtn">クリア</button>
  </div>
</div>

<div class="empty" id="emptyState">まだ点検していません。データを貼り付けて「点検する」を押してください。</div>

<div class="report" id="report"></div>

</div>

<script>
const REQUIRED_COLS = ["商品コード","商品名称","集荷先名","出品商品情報削除フラグ","寄附金額1","提供価格(税込)1"];

const SAMPLE = `商品コード\t商品名称\t集荷先名\t出品商品情報削除フラグ\t寄附金額1\t提供価格(税込)1
SP001-001\tきたはま産完熟みかん3kg\tきたはま農園\t無\t10000\t3000
SP001-002\tきたはま産完熟みかん5kg\tきたはま農園\t無\t15000\t4500
SP002-001\t地魚の干物セット\t北浜漁業協同組合\t無\t12000\t3600
SP002-002\t地魚の干物セット(大)\t北浜漁業協同組合\t無\t18000\t5400
SP002-003\t地魚の干物セット(旧)\t北浜漁協協同組合\t有\t18000\t5400
SP003-001\t手作り木工テーブル\tきたはま木工房\t無\t35000\t117000
SP004-001\t季節のジェラート6個入り\tきたはまジェラート工房\t無\t8000\t2560
SP004-002\t季節のジェラート12個入り\tきたはまジェラート工房\t無\t12000\t3800
SP005-001\t絶景クルーズご招待\t北浜観光船組合\t無\t33000\t10100
SP005-001\t絶景クルーズご招待(重複コード)\t北浜観光船組合\t無\t33000\t10500
SP006-001\t町の特製みそ\t有限会社きたはま醸造\t無\t\t2200
SP006-002\t町の特製しょうゆ\t有限会社きたはま醸造\t無\t9000\t`;

function parseTable(text){
  const lines = text.replace(/\r\n/g,"\n").split("\n").filter(l => l.trim().length>0);
  if(lines.length < 2) return null;
  const delim = (lines[0].split("\t").length >= lines[0].split(",").length) ? "\t" : ",";
  const header = lines[0].split(delim).map(h=>h.trim());
  const idx = {};
  REQUIRED_COLS.forEach(c => idx[c] = header.indexOf(c));
  const rows = lines.slice(1).map(line=>{
    const cells = line.split(delim);
    const get = c => idx[c] >= 0 ? (cells[idx[c]] ?? "").trim() : "";
    return {
      code: get("商品コード"),
      name: get("商品名称"),
      carrier: get("集荷先名"),
      delFlag: get("出品商品情報削除フラグ"),
      donation: get("寄附金額1"),
      price: get("提供価格(税込)1"),
      raw: cells
    };
  }).filter(r => r.code);
  return { header, idx, rows };
}

function levenshtein(a,b){
  const m=a.length, n=b.length;
  if(m===0) return n; if(n===0) return m;
  const dp = Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++){
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  }
  return dp[m][n];
}

function normCode(s){ return (s||"").replace(/\s+/g,"").replace(/　/g,""); }

function runCheck(parsed){
  const rows = parsed.rows;
  const totalRows = rows.length;

  const deleted = rows.filter(r => r.delFlag === "有");
  const active = rows.filter(r => r.delFlag !== "有");

  // 重複チェック(有効行のみ)
  const seen = {}; const dupGroups = {};
  active.forEach(r=>{
    const c = normCode(r.code);
    if(!c) return;
    (seen[c] = seen[c] || []).push(r);
  });
  Object.entries(seen).forEach(([c,list])=>{ if(list.length>1) dupGroups[c]=list; });

  // 表記ゆれ疑い(集荷先名)
  const uniqueCarriers = [...new Set(active.map(r=>r.carrier).filter(Boolean))];
  const nearPairs = [];
  const flagged = new Set();
  for(let i=0;i<uniqueCarriers.length;i++){
    for(let j=i+1;j<uniqueCarriers.length;j++){
      const a=uniqueCarriers[i], b=uniqueCarriers[j];
      const d = levenshtein(a.replace(/\s+/g,"").replace(/　/g,""), b.replace(/\s+/g,"").replace(/　/g,""));
      const maxLen = Math.max(a.length,b.length);
      if(a!==b && d>0 && d <= Math.max(1, Math.round(maxLen*0.2)) && d<=4){
        nearPairs.push([a,b,d]); flagged.add(a); flagged.add(b);
      }
    }
  }

  // 3割ルール
  const priceIssues = [];
  active.forEach(r=>{
    const don = parseFloat(r.donation), pri = parseFloat(r.price);
    if(!isFinite(don) || !isFinite(pri) || don<=0) return;
    const ratio = pri/don;
    if(ratio > 0.30){
      priceIssues.push({...r, ratio, critical: ratio > 1.0});
    }
  });

  // 空欄チェック
  const blanks = [];
  active.forEach(r=>{
    const missing = [];
    if(!r.donation) missing.push("寄附金額1");
    if(!r.price) missing.push("提供価格(税込)1");
    if(!r.carrier) missing.push("集荷先名");
    if(missing.length) blanks.push({...r, missing});
  });

  return { totalRows, deletedCount: deleted.length, activeCount: active.length,
    dupGroups, nearPairs, priceIssues, blanks };
}

function fmtYen(v){ const n = parseFloat(v); return isFinite(n) ? "¥"+n.toLocaleString() : "―"; }

function render(result){
  const el = document.getElementById("report");
  const totalIssues = Object.keys(result.dupGroups).length + result.nearPairs.length
    + result.priceIssues.length + result.blanks.length;
  const hasCritical = Object.keys(result.dupGroups).length>0
    || result.priceIssues.some(p=>p.critical);

  let html = "";
  html += `<div class="ticket">
    <div class="stamp ${totalIssues===0?'good':'bad'}">${totalIssues===0?'良好<br>異常なし':'要確認<br>'+totalIssues+'件'}</div>
    <h2>検査結果票</h2>
    <div class="stats">
      <div class="stat"><div class="num">${result.totalRows}</div><div class="lbl">読み込んだ行数</div></div>
      <div class="stat"><div class="num">${result.deletedCount}</div><div class="lbl">削除済み(自動スキップ)</div></div>
      <div class="stat"><div class="num">${result.activeCount}</div><div class="lbl">点検対象(有効行)</div></div>
      <div class="stat"><div class="num">${totalIssues}</div><div class="lbl">検出された要確認件数</div></div>
    </div>
  </div>`;

  const dupList = Object.entries(result.dupGroups);
  if(dupList.length){
    html += `<section class="cat cat-crit"><div class="cathead">
      <span class="catdot"></span><h3>商品コードの重複(削除済み以外)</h3>
      <span class="count">${dupList.length}件</span></div>`;
    dupList.forEach(([code,list])=>{
      html += `<div class="item"><span class="code">${code}</span>
        <div class="desc"><div class="detail">同じコードが<b>${list.length}回</b>出現(削除済みではない行同士)。doの登録を確認してください。</div>
        <div class="name">${list.map(r=>escapeHtml(r.name)).join(' / ')}</div></div></div>`;
    });
    html += `</section>`;
  }

  if(result.nearPairs.length){
    html += `<section class="cat cat-warn"><div class="cathead">
      <span class="catdot"></span><h3>集荷先名の表記ゆれ疑い</h3>
      <span class="count">${result.nearPairs.length}組</span></div>`;
    result.nearPairs.forEach(([a,b,d])=>{
      html += `<div class="item"><span class="code">▲</span>
        <div class="desc"><div class="detail"><b>${escapeHtml(a)}</b> <span class="arrow">⇄</span> <b>${escapeHtml(b)}</b></div>
        <div class="name">文字の違い ${d}箇所。同じ集荷先なら、doでどちらかの表記に統一してください。</div></div></div>`;
    });
    html += `</section>`;
  }

  const critPrice = result.priceIssues.filter(p=>p.critical);
  const warnPrice = result.priceIssues.filter(p=>!p.critical);
  if(critPrice.length){
    html += `<section class="cat cat-crit"><div class="cathead">
      <span class="catdot"></span><h3>価格が異常(提供価格が寄附金額を超過)</h3>
      <span class="count">${critPrice.length}件</span></div>`;
    critPrice.forEach(r=>{
      html += `<div class="item"><span class="code">${escapeHtml(r.code)}</span>
        <div class="desc"><div class="detail">寄附${fmtYen(r.donation)} <span class="arrow">→</span> 提供価格${fmtYen(r.price)}(比率 ${(r.ratio*100).toFixed(0)}%)。値の入れ違いの可能性。</div>
        <div class="name">${escapeHtml(r.name)}</div></div></div>`;
    });
    html += `</section>`;
  }
  if(warnPrice.length){
    html += `<section class="cat cat-warn"><div class="cathead">
      <span class="catdot"></span><h3>3割ルールぎりぎり超過</h3>
      <span class="count">${warnPrice.length}件</span></div>`;
    warnPrice.forEach(r=>{
      const need = Math.ceil(parseFloat(r.price)/0.3/100)*100;
      html += `<div class="item"><span class="code">${escapeHtml(r.code)}</span>
        <div class="desc"><div class="detail">比率 <b>${(r.ratio*100).toFixed(1)}%</b>(寄附${fmtYen(r.donation)} / 提供価格${fmtYen(r.price)})。30%以下にするなら寄附額${fmtYen(need)}〜。</div>
        <div class="name">${escapeHtml(r.name)}</div></div></div>`;
    });
    html += `</section>`;
  }

  if(result.blanks.length){
    html += `<section class="cat cat-warn"><div class="cathead">
      <span class="catdot"></span><h3>必須項目の空欄</h3>
      <span class="count">${result.blanks.length}件</span></div>`;
    result.blanks.forEach(r=>{
      html += `<div class="item"><span class="code">${escapeHtml(r.code)}</span>
        <div class="desc"><div class="detail">空欄: <b>${r.missing.join('・')}</b></div>
        <div class="name">${escapeHtml(r.name)}</div></div></div>`;
    });
    html += `</section>`;
  }

  html += `<div class="foot">このツールは<b>検出のみ</b>行い、自動では何も直しません。修正はふるさとdoの管理画面で行ってください。削除済み行(${result.deletedCount}件)は発注書アプリの読み込みでも自動的に除外されます。</div>`;

  el.innerHTML = html;
  el.classList.add("show");
  document.getElementById("emptyState").style.display = "none";
}

function escapeHtml(s){
  return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

document.getElementById("runBtn").addEventListener("click", ()=>{
  const text = document.getElementById("input").value;
  const parsed = parseTable(text);
  if(!parsed){ alert("データが少なすぎます。ヘッダー行+データ行を貼り付けてください。"); return; }
  const result = runCheck(parsed);
  render(result);
});

document.getElementById("sampleBtn").addEventListener("click", ()=>{
  document.getElementById("input").value = SAMPLE;
});

document.getElementById("clearBtn").addEventListener("click", ()=>{
  document.getElementById("input").value = "";
  document.getElementById("report").classList.remove("show");
  document.getElementById("emptyState").style.display = "block";
});
</script>
</body>
</html>
