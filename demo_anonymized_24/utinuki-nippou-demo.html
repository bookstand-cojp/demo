<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報入力システム｜デモ版</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #f0f2f5; color: #333;
  }
  .demo-banner {
    background: linear-gradient(90deg, #FF9800, #F57C00); color: #fff;
    text-align: center; padding: 8px 16px; font-size: 13px; font-weight: bold;
  }
  .account-bar {
    background: #fff; border-bottom: 1px solid #e0e0e0; padding: 8px 16px;
    text-align: center; font-size: 13px; color: #555;
  }
  .account-bar .email { font-weight: bold; color: #1A56A0; }
  .account-bar .switch-link {
    margin-left: 10px; font-size: 12px; color: #1A56A0; text-decoration: underline;
    cursor: pointer; background: none; border: none; font-family: inherit;
  }
  .tabs {
    display: flex; background: #fff; border-bottom: 2px solid #1A56A0;
    position: sticky; top: 0; z-index: 10;
  }
  .tab-btn {
    flex: 1; padding: 12px 4px; border: none; background: none; font-size: 12px;
    font-weight: bold; color: #888; cursor: pointer; transition: background .15s, color .15s;
  }
  .tab-btn.active { background: #1A56A0; color: #fff; }
  .tab-btn:hover:not(.active) { background: #f0f4fa; }
  .container { max-width: 600px; margin: 20px auto; padding: 0 16px 40px; }
  .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .card-title { text-align: center; color: #1A56A0; font-size: 18px; font-weight: bold; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 6px; }
  input[type="date"], select, input[type="text"], textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 7px;
    font-size: 14px; font-family: inherit; background: #fafafa;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #1A56A0; background: #fff; }
  textarea { height: 110px; resize: vertical; }
  .btn-save {
    width: 100%; padding: 14px; background: #1A56A0; color: #fff; border: none;
    border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
    margin-top: 6px; transition: background .2s;
  }
  .btn-save:hover:not(:disabled) { background: #1345a0; }
  .btn-save:disabled { background: #aaa; cursor: not-allowed; }
  .msg { text-align: center; padding: 10px 14px; border-radius: 7px; margin-bottom: 14px; font-size: 14px; display: none; }
  .msg.success { background: #d4edda; color: #155724; }
  .msg.error   { background: #f8d7da; color: #721c24; }
  .msg.info    { background: #d1ecf1; color: #0c5460; }
  .date-filter { display: flex; gap: 6px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .date-filter input { flex: 1; min-width: 120px; }
  .date-filter .sep { color: #888; font-size: 13px; }
  .btn-filter {
    padding: 9px 16px; background: #1A56A0; color: #fff; border: none; border-radius: 7px;
    font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap;
  }
  .report-item { border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; background: #fafafa; }
  .report-date { font-weight: bold; color: #1A56A0; font-size: 14px; margin-bottom: 2px; }
  .report-meta { font-size: 12px; color: #777; margin-bottom: 8px; }
  .report-content { font-size: 14px; white-space: pre-wrap; color: #333; }
  .empty-msg { text-align: center; color: #aaa; padding: 30px 0; font-size: 14px; }
  .sync-desc { background: #f0f4fa; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #444; margin-bottom: 20px; line-height: 1.7; }
  .sync-result { display: none; background: #f8f9fa; border-radius: 8px; padding: 16px; margin-top: 16px; }
  .sync-result-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  .sync-result-item:last-child { border-bottom: none; }
  .sync-result-item .label { color: #666; }
  .sync-result-item .value { font-weight: bold; color: #1A56A0; }
  .spinner {
    display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="demo-banner">🔸 これはデモ版です。実際のカレンダーやデータには接続されません 🔸</div>

<div class="account-bar">
  ログイン中:
  <span class="email" id="accountEmail">tanaka@example.co.jp</span>
  <button class="switch-link" onclick="alert('デモ版では切り替えできません。\n\n本番では、Chromeの別プロフィールで新しいウィンドウを開くと別アカウントで使えます。')">別アカウントで開き直す</button>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-btn-input" onclick="switchTab('input')">✏️ 日報入力</button>
  <button class="tab-btn"        id="tab-btn-list"  onclick="switchTab('list')">📋 日報一覧</button>
  <button class="tab-btn"        id="tab-btn-sync"  onclick="switchTab('sync')">🔄 カレンダー同期</button>
</div>

<div id="tab-input">
  <div class="container">
    <div class="card">
      <div class="card-title">📝 日報作成</div>
      <div class="msg" id="msg"></div>
      <div class="form-group">
        <label class="form-label">📅 実施日</label>
        <input type="date" id="date" onchange="onDateChange()">
      </div>
      <div class="form-group">
        <label class="form-label">🔍 予定を選択</label>
        <select id="eventSelect"></select>
      </div>
      <div class="form-group">
        <label class="form-label">▶️ 活動項目</label>
        <select id="activity">
          <option value="来社">来社</option>
          <option value="訪問">訪問</option>
          <option value="リモート">リモート</option>
          <option value="電話">電話</option>
          <option value="社内">社内</option>
          <option value="メール">メール</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">👥 同行者</label>
        <input type="text" id="companion" placeholder="同行者の名前（任意）">
      </div>
      <div class="form-group">
        <label class="form-label">📝 内容</label>
        <textarea id="content" placeholder="活動内容を入力してください"></textarea>
      </div>
      <button class="btn-save" id="saveBtn" onclick="onSave()">日報を保存する</button>
    </div>
  </div>
</div>

<div id="tab-list" style="display:none">
  <div class="container">
    <div class="card">
      <div class="card-title">📋 日報一覧</div>
      <div class="date-filter">
        <input type="date" id="fromDate">
        <span class="sep">〜</span>
        <input type="date" id="toDate">
        <button class="btn-filter" onclick="loadReports()">絞り込む</button>
      </div>
      <div id="reportsList"></div>
    </div>
  </div>
</div>

<div id="tab-sync" style="display:none">
  <div class="container">
    <div class="card">
      <div class="card-title">🔄 過去データをカレンダーに同期</div>
      <div class="sync-desc">
        スプレッドシートに保存されている過去の日報を、Googleカレンダーの予定に書き込みます。<br><br>
        <b>マッチング方式：</b>「日時が一致」または「タイトルが一致」する予定に書き込みます。<br>
        <b>注意：</b>すでに日報が書き込まれている予定はスキップします。
      </div>
      <div class="form-group">
        <label class="form-label">📅 同期する期間</label>
        <div class="date-filter">
          <input type="date" id="syncFromDate">
          <span class="sep">〜</span>
          <input type="date" id="syncToDate">
        </div>
      </div>
      <div class="msg" id="syncMsg"></div>
      <button class="btn-save" id="syncBtn" onclick="onSyncCalendar()">カレンダーに同期する</button>
      <div class="sync-result" id="syncResult">
        <div class="sync-result-item"><span class="label">✅ カレンダーに書き込み成功</span><span class="value" id="syncMatched">0件</span></div>
        <div class="sync-result-item"><span class="label">⏭️ 書き込み済みのためスキップ</span><span class="value" id="syncAlready">0件</span></div>
        <div class="sync-result-item"><span class="label">❌ 対応する予定が見つからず未反映</span><span class="value" id="syncSkipped">0件</span></div>
        <div class="sync-result-item"><span class="label">📊 処理対象合計</span><span class="value" id="syncTotal">0件</span></div>
      </div>
    </div>
  </div>
</div>

<script>
  var DUMMY_EVENTS = [
    { id:'e1', title:'[営業] 10:00 山田商事 定例MTG' },
    { id:'e2', title:'[営業] 13:30 グリーン工業 新規提案' },
    { id:'e3', title:'[社内] 16:00 チーム週次ミーティング' }
  ];

  var DUMMY_REPORTS = [
    { date:'2026-06-14', title:'グリーン工業 新規提案', activity:'訪問', companion:'部長', content:'新製品ラインの提案を実施。先方は前向きで、来週見積もりを提出予定。競合はA社。' },
    { date:'2026-06-13', title:'山田商事 定例MTG', activity:'来社', companion:'', content:'月次の発注確認。今月は前月比120%。追加ロットの相談あり。' },
    { date:'2026-06-12', title:'佐藤製作所 アフターフォロー', activity:'電話', companion:'', content:'納品後の稼働状況確認。問題なく稼働中。次回定期点検は7月中旬で調整。' },
    { date:'2026-06-11', title:'ブルースカイ社 商談', activity:'リモート', companion:'課長', content:'オンラインでの初回商談。ニーズヒアリング完了。要件をまとめて再提案する。' }
  ];

  var currentTab = 'input';

  (function init(){
    var t = new Date();
    var s = t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
    var m1 = s.slice(0,7)+'-01';
    document.getElementById('date').value = s;
    document.getElementById('fromDate').value = m1;
    document.getElementById('toDate').value = s;
    document.getElementById('syncFromDate').value = m1;
    document.getElementById('syncToDate').value = s;
    loadEvents();
  })();

  function switchTab(tab){
    currentTab = tab;
    ['input','list','sync'].forEach(function(tt){
      document.getElementById('tab-'+tt).style.display = (tt===tab)?'block':'none';
      document.getElementById('tab-btn-'+tt).classList.toggle('active', tt===tab);
    });
    if(tab==='list') loadReports();
  }

  function onDateChange(){ loadEvents(); }

  function loadEvents(){
    var sel = document.getElementById('eventSelect');
    sel.innerHTML = '';
    DUMMY_EVENTS.forEach(function(ev){
      var o = document.createElement('option');
      o.value = ev.id; o.textContent = ev.title;
      sel.appendChild(o);
    });
  }

  function onSave(){
    var content = document.getElementById('content').value.trim();
    if(!content){ showMsg('内容を入力してください','error'); return; }
    if(!confirm('このアカウントで保存します：\n\ntanaka@example.co.jp\n\nよろしいですか？')) return;

    var btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>保存中...';

    setTimeout(function(){
      btn.disabled = false;
      btn.innerHTML = '日報を保存する';
      showMsg('✅ 保存完了（tanaka@example.co.jp）','success');
      var sel = document.getElementById('eventSelect');
      var title = sel.options[sel.selectedIndex].textContent.replace(/^\[.*?\]\s*\d{2}:\d{2}\s*/,'');
      DUMMY_REPORTS.unshift({
        date: document.getElementById('date').value,
        title: title,
        activity: document.getElementById('activity').value,
        companion: document.getElementById('companion').value.trim(),
        content: content
      });
      document.getElementById('content').value = '';
      document.getElementById('companion').value = '';
    }, 800);
  }

  function loadReports(){
    var list = document.getElementById('reportsList');
    if(DUMMY_REPORTS.length===0){ list.innerHTML='<div class="empty-msg">この期間の日報はありません</div>'; return; }
    list.innerHTML = DUMMY_REPORTS.map(function(r){
      return '<div class="report-item">'+
        '<div class="report-date">'+esc(r.date)+'</div>'+
        '<div class="report-meta">'+esc(r.title)+'　|　'+esc(r.activity)+
        (r.companion?'　|　同行: '+esc(r.companion):'')+'</div>'+
        '<div class="report-content">'+esc(r.content)+'</div></div>';
    }).join('');
  }

  function onSyncCalendar(){
    if(!confirm('指定期間の日報をGoogleカレンダーに同期します。\nよろしいですか？')) return;
    var btn = document.getElementById('syncBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>同期中...';
    showSyncMsg('カレンダーを検索してマッチングしています...','info');
    document.getElementById('syncResult').style.display='none';
    setTimeout(function(){
      btn.disabled = false;
      btn.innerHTML = 'カレンダーに同期する';
      showSyncMsg('同期完了しました！','success');
      document.getElementById('syncMatched').textContent = '3件';
      document.getElementById('syncAlready').textContent = '1件';
      document.getElementById('syncSkipped').textContent = '0件';
      document.getElementById('syncTotal').textContent = '4件';
      document.getElementById('syncResult').style.display='block';
    }, 1500);
  }

  function showMsg(t,type){
    var el = document.getElementById('msg');
    el.textContent=t; el.className='msg'+(type?' '+type:''); el.style.display=t?'block':'none';
  }
  function showSyncMsg(t,type){
    var el = document.getElementById('syncMsg');
    el.textContent=t; el.className='msg'+(type?' '+type:''); el.style.display=t?'block':'none';
  }
  function esc(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
